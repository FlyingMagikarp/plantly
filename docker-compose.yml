services:
  db:
    image: postgres:15-alpine
    container_name: plantly-db
    environment:
      POSTGRES_DB: ${DB_NAME:-plantly}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-plantly_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-plantly}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./plantly-backend
      dockerfile: Dockerfile
    container_name: plantly-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-plantly_pass}
      DB_NAME: ${DB_NAME:-plantly}
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./plantly-frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL must point to the backend URL. 
        # For local browser access, 'localhost' is usually fine if not using a phone.
        # If using a phone, set LAN_IP to your machine's IP.
        VITE_API_URL: http://${LAN_IP:-localhost}:8081
    container_name: plantly-frontend
    environment:
      PORT: 3000
      VITE_API_URL: http://${LAN_IP:-localhost}:8081
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
